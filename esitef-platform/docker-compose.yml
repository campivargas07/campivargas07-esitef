# PostgreSQL for ESITEF platform (migration target)
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: esitef
      POSTGRES_PASSWORD: esitef
      POSTGRES_DB: esitef
    volumes:
      - /tmp/esitef-platform-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esitef -d esitef"]
      interval: 5s
      timeout: 5s
      retries: 10
